<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BetAlmighty Engineering Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E17;
    --surface:#121826;
    --surface-raised:#1A2233;
    --hairline:#263143;
    --text:#E7ECF3;
    --muted:#8B95A7;
    --gold:#E3A008;
    --teal:#2DD4BF;
    --amber:#F5A524;
    --coral:#F87171;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(227,160,8,0.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'IBM Plex Mono', monospace;
    min-height:100vh;
  }
  h1,h2,h3,.display{ font-family:'Space Grotesk', sans-serif; }

  /* header */
  header{
    padding:32px 40px 20px;
    border-bottom:1px dashed var(--hairline);
  }
  .eyebrow{
    font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gold);
    margin:0 0 8px;
  }
  .headerRow{ display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:24px; }
  h1{ font-size:28px; margin:0; font-weight:700; }
  .subline{ color:var(--muted); font-size:13px; margin-top:6px; }
  .overallBlock{ text-align:right; }
  .overallNum{ font-size:44px; font-weight:600; font-family:'IBM Plex Mono',monospace; color:var(--teal); line-height:1; }
  .overallLabel{ font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }

  /* tabs */
  #tabs{ display:flex; gap:8px; padding:20px 40px 0; flex-wrap:wrap; }
  .tab{
    background:var(--surface); border:1px solid var(--hairline); color:var(--muted);
    border-radius:20px; padding:8px 16px; font-size:12px; cursor:pointer;
    font-family:'IBM Plex Mono',monospace; transition:all .15s ease;
  }
  .tab:hover{ border-color:var(--gold); color:var(--text); }
  .tab.active{ background:var(--gold); color:#1a1204; border-color:var(--gold); font-weight:600; }
  .tab .count{ opacity:.75; margin-left:4px; }

  /* overview strip */
  #overview{ padding:24px 40px 4px; }
  .overviewTitle{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; }
  .barRow{ display:flex; align-items:center; gap:14px; padding:7px 0; cursor:pointer; }
  .barName{ width:170px; font-size:12px; flex-shrink:0; }
  .barTrack{ flex:1; height:8px; background:var(--surface-raised); border-radius:4px; overflow:hidden; position:relative; }
  .barFill{ height:100%; border-radius:4px; transition:width .5s ease; }
  .barPct{ width:44px; text-align:right; font-size:12px; color:var(--muted); flex-shrink:0; }
  .barRow:hover .barTrack{ box-shadow:0 0 0 1px var(--gold); }

  /* grid */
  #grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; padding:24px 40px 40px; }
  .card{
    background:var(--surface); border:1px solid var(--hairline); border-left:4px solid var(--muted);
    border-radius:10px; padding:18px; cursor:pointer; transition:transform .15s ease, border-color .15s ease;
    position:relative;
  }
  .card:hover{ transform:translateY(-2px); border-color:var(--gold); }
  .card.hidden{ display:none; }
  .card.selected{ outline:1px solid var(--gold); }
  .cardTop{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .cardName{ font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; margin:0; }
  .cardTeam{ font-size:11px; color:var(--muted); margin-top:3px; }
  .statusPill{ font-size:10px; padding:3px 9px; border-radius:10px; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
  .cardMid{ display:flex; align-items:center; gap:14px; margin-top:14px; }
  .ringWrap{ position:relative; width:64px; height:64px; flex-shrink:0; }
  .ringPct{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; }
  .modCount{ font-size:12px; color:var(--muted); }
  .blockerFlag{ margin-top:12px; font-size:11px; color:var(--coral); display:flex; align-items:center; gap:6px; }
  .blockerFlag::before{ content:"●"; font-size:8px; }
  .clickHint{ margin-top:12px; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

  /* detail panel */
  #overlay{ position:fixed; inset:0; background:rgba(4,6,10,0.7); display:none; align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto; z-index:50; }
  #overlay.open{ display:flex; }
  #ticket{
    background:var(--surface); border:1px solid var(--hairline); border-radius:12px; max-width:640px; width:100%;
    padding:0 0 28px; position:relative; box-shadow:0 30px 60px rgba(0,0,0,0.5);
  }
  .perf{ display:flex; justify-content:space-between; padding:14px 24px 0; }
  .perf span{ width:8px; height:8px; border-radius:50%; background:var(--bg); border:1px solid var(--hairline); }
  .ticketHead{ padding:16px 28px 20px; border-bottom:1px dashed var(--hairline); }
  .closeBtn{ position:absolute; top:14px; right:20px; background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; font-family:monospace; }
  .closeBtn:hover{ color:var(--text); }
  .ticketName{ font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; margin:0; }
  .ticketMeta{ font-size:12px; color:var(--muted); margin-top:6px; }
  .ticketPct{ font-size:34px; color:var(--teal); font-weight:600; float:right; }
  .section{ padding:18px 28px 0; }
  .sectionTitle{ font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--gold); margin:0 0 10px; }
  .modList{ list-style:none; margin:0; padding:0; font-size:12.5px; }
  .modList li{ display:flex; gap:10px; padding:5px 0; border-bottom:1px dotted var(--hairline); }
  .modList li:last-child{ border-bottom:none; }
  .tick{ flex-shrink:0; }
  .tick.done{ color:var(--teal); }
  .tick.pending{ color:var(--muted); }
  .modList li.done span.label{ color:var(--text); }
  .modList li.pending span.label{ color:var(--muted); }
  .timelineGrid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .timelineCol h4{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:0 0 8px; }
  .timelineCol ul{ margin:0; padding-left:16px; font-size:12px; line-height:1.6; }
  .box{ margin-top:6px; padding:12px 14px; border-radius:8px; font-size:12px; line-height:1.5; }
  .box.blockers{ background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.3); color:#fca5a5; }
  .box.clear{ background:rgba(45,212,191,0.08); border:1px solid rgba(45,212,191,0.25); color:#7fe0d5; }
  .box.change{ background:rgba(139,149,167,0.08); border:1px solid var(--hairline); color:var(--muted); }
  .noteFooter{ padding:18px 28px 0; font-size:11px; color:var(--muted); font-style:italic; line-height:1.6; border-top:1px dashed var(--hairline); margin-top:18px; }

  /* module ledger */
  #moduleLedger{ padding:8px 40px 48px; border-top:1px dashed var(--hairline); margin-top:8px; }
  #moduleTabs{ display:flex; gap:8px; flex-wrap:wrap; margin:14px 0; }
  #engineerChips{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .chip{ font-size:11px; padding:6px 13px; }
  .ledgerGroup{ margin-bottom:16px; padding:14px 18px; background:var(--surface-raised); border:1px solid var(--hairline); border-radius:8px; }
  .ledgerGroupHead{ display:flex; align-items:center; gap:10px; cursor:pointer; margin-bottom:8px; }
  .ledgerGroupHead:hover .ledgerName{ color:var(--gold); }
  .ledgerDot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .ledgerName{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; transition:color .15s ease; }
  .ledgerTeam{ font-size:11px; color:var(--muted); }
  .ledgerCount{ margin-left:auto; font-size:11px; color:var(--muted); }
  .emptyNote{ color:var(--muted); font-size:12px; margin:6px 0 0; }

  @media (max-width:560px){
    header, #tabs, #overview, #grid{ padding-left:18px; padding-right:18px; }
    .timelineGrid{ grid-template-columns:1fr; }
    .overallBlock{ text-align:left; }
  }
</style>
</head>
<body>

<header>
  <div class="headerRow">
    <div>
      <p class="eyebrow">Daily project report — 22/07/2026</p>
      <h1>BetAlmighty Engineering Ledger</h1>
      <p class="subline">Five engineers, five tracks, one ship date. Click any name for the full audit trail.</p>
    </div>
    <div class="overallBlock">
      <div class="overallNum" id="overallNum">0%</div>
      <div class="overallLabel">Modules complete, all tracks</div>
    </div>
  </div>
</header>

<div id="tabs"></div>

<div id="overview">
  <div class="overviewTitle">Completion by engineer</div>
  <div id="barChart"></div>
</div>

<div id="grid"></div>

<div id="moduleLedger">
  <div class="overviewTitle">Module ledger &mdash; browse by report category, then narrow by engineer</div>
  <div id="moduleTabs"></div>
  <div id="engineerChips"></div>
  <div id="ledgerList"></div>
</div>

<div id="overlay">
  <div id="ticket">
    <button class="closeBtn" onclick="closeTicket()">&times;</button>
    <div class="perf"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div id="ticketContent"></div>
  </div>
</div>

<script>

const ENGINEERS = [

  },
  {

    modules: mobileModules, timeline: mobileTimeline,
    blockers:['Awaiting API from Backend'], changeRequests:[],
    note:'Module completion is reported jointly for Joseph and David Adeshina in the source report; figures shown here are shared across both.'
  },
  {
    id:'uchechukwu', name:'Uchechukwu', team:'Customer Web', role:'Web Engineer', status:'progress',
    modules:[
      M('Security implementation', false),
      M('Ledger management and fraud rules implementation', false),
      M('Account and profile module', true),
      M('Notification module', true),
      M('Wallet module', true),
      M('Funding: Card (WayaQuick)', false),
      M('Funding: Virtual account (WayaQuick)', false),
      M('Funding: Bank / WayaBank (WayaQuick)', false),
      M('Funding: Card (Paystack)', false),
      M('Funding: Virtual account (Paystack)', false),

      week:['Complete security implementation','Fix any issues found during testing','Final stability and performance verification'],

    },

  },
  {
    id:'knechukwu', name:'Knechukwu', team:'Admin Web', role:'Admin Web Engineer', status:'completed',
    modules:[
      M('Account creation module', true),
      M('Lottery module', true),
      M('P2P betting module', true),
      M('Community module', true),
      M('Ledger management module', true),
      M('Security module', true),
      M('Interception module', true),
      M('Admin account and profile management', true),
      M('Admin KYC management', true),
      M('Admin account service module', true),
      M('Admin approval management module', true),
      M('Admin audit trail module', true),
      M('Admin user activity log module', true),
      M('Admin internal reporting module', true),
      M('Admin dashboard module', true),
      M('Admin lottery management module', true),
      M('Admin P2P management module', true),
      M('Admin community management module', true),

      M('Admin payment service module', true),
      M('Admin GL management module', true),

      M('Admin request module', true)
    ],
    timeline:{
      yesterday:['All 27 modules already complete going into today'],
      today:['No outstanding module development tasks remain','Security fixes and enhancements','Testing and validation','Bug resolution','Integration checks','Final refinements based on findings'],

      nextWeek:['Continuous improvement','Security hardening','Performance optimization','Production readiness checks','Additional enhancements based on feedback']
    },

    note:'All listed modules are marked complete. Per the report\u2019s side note, the security module is done, but hardening, fixes and vulnerability testing continue.'
  },
  {
    id:'abeeb', name:'Abeeb', team:'Backend', role:'Backend Engineer', status:'near',
    modules:[
      M('Security implementation', false),
      M('Ledger management and fraud rules implementation', false),
      M('Account and profile module', true),
      M('Notification module', true),
      M('Wallet module', true),
      M('Funding: Card (WayaQuick)', true),

function pct(eng){
  const done = eng.modules.filter(m=>m.done).length;
  return {done, total:eng.modules.length, pct: Math.round((done/eng.modules.length)*100)};
}

function overallPct(){
  let done=0, total=0;
  ENGINEERS.forEach(e=>{ const p=pct(e); done+=p.done; total+=p.total; });
  return Math.round((done/total)*100);
}

function ring(percent, color, size){
  size = size||64;
  const stroke = 7;
  const r = (size-stroke)/2;
  const c = 2*Math.PI*r;
  const offset = c - (percent/100)*c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--hairline)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})"/>
  </svg>`;
}

let activeFilter = 'all';

function renderTabs(){
  const counts = {all:ENGINEERS.length, completed:0, near:0, progress:0};
  ENGINEERS.forEach(e=>counts[e.status]++);
  const tabsDiv = document.getElementById('tabs');
  const defs = [
    ['all','All engineers'],
    ['completed','Completed'],
    ['near','Near Completion'],
    ['progress','In Progress']
  ];
  tabsDiv.innerHTML = defs.map(([key,label])=>
    `<button class="tab ${key===activeFilter?'active':''}" data-key="${key}" onclick="setFilter('${key}')">
      ${label} <span class="count">${counts[key]}</span>
    </button>`).join('');
}

function setFilter(key){
  activeFilter = key;
  renderTabs();
  document.querySelectorAll('.card').forEach(card=>{
    const status = card.getAttribute('data-status');
    card.classList.toggle('hidden', key!=='all' && status!==key);
  });
}

function renderBarChart(){
  const el = document.getElementById('barChart');
  el.innerHTML = ENGINEERS.map(e=>{
    const p = pct(e);
    const color = STATUS_META[e.status].color;
    return `<div class="barRow" onclick="openTicket('${e.id}')">
      <div class="barName">${e.name}</div>
      <div class="barTrack"><div class="barFill" style="width:${p.pct}%;background:${color}"></div></div>
      <div class="barPct">${p.pct}%</div>
    </div>`;
  }).join('');
}

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = ENGINEERS.map(e=>{
    const p = pct(e);
    const meta = STATUS_META[e.status];
    const hasBlockers = e.blockers && e.blockers.length>0;
    return `<div class="card" data-status="${e.status}" style="border-left-color:${meta.color}" onclick="openTicket('${e.id}')">
      <div class="cardTop">
        <div>
          <p class="cardName">${e.name}</p>
          <p class="cardTeam">${e.team} · ${e.role}</p>
        </div>
        <span class="statusPill" style="background:${meta.color}22;color:${meta.color};border:1px solid ${meta.color}55">${meta.label}</span>
      </div>
      <div class="cardMid">
        <div class="ringWrap">
          ${ring(p.pct, meta.color)}
          <div class="ringPct" style="color:${meta.color}">${p.pct}%</div>
        </div>
        <div class="modCount">${p.done} of ${p.total}<br>modules complete</div>
      </div>
      ${hasBlockers ? `<div class="blockerFlag">${e.blockers[0]}</div>` : ''}
      <div class="clickHint">Click for full detail &rarr;</div>
    </div>`;
  }).join('');
}

function listSection(title, items){
  if(!items || items.length===0) return `<div class="timelineCol"><h4>${title}</h4><ul><li style="color:var(--muted)">Nothing listed</li></ul></div>`;
  return `<div class="timelineCol"><h4>${title}</h4><ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
}

function openTicket(id){
  const e = ENGINEERS.find(x=>x.id===id);
  const p = pct(e);
  const meta = STATUS_META[e.status];
  const modListHtml = e.modules.map(m=>
    `<li class="${m.done?'done':'pending'}">
      <span class="tick ${m.done?'done':'pending'}">${m.done?'\u2611':'\u2610'}</span>
      <span class="label">${m.name}</span>
    </li>`).join('');

  const blockersHtml = e.blockers && e.blockers.length
    ? `<div class="box blockers"><strong>Blockers:</strong> ${e.blockers.join('; ')}</div>`
    : `<div class="box clear">No blockers requiring escalation right now.</div>`;

  const changeHtml = e.changeRequests && e.changeRequests.length
    ? `<div class="box change"><strong>Change requests:</strong> ${e.changeRequests.join('; ')}</div>`
    : `<div class="box change">No open change requests.</div>`;

  document.getElementById('ticketContent').innerHTML = `
    <div class="ticketHead">
      <span class="ticketPct" style="color:${meta.color}">${p.pct}%</span>
      <p class="ticketName">${e.name}</p>
      <p class="ticketMeta">${e.team} &middot; ${e.role} &middot; ${p.done} of ${p.total} modules complete &middot;
        <span style="color:${meta.color}">${meta.label}</span>
      </p>
    </div>

    <div class="section">
      <p class="sectionTitle">Module checklist</p>
      <ul class="modList">${modListHtml}</ul>
    </div>

    <div class="section">
      <p class="sectionTitle">Timeline</p>
      <div class="timelineGrid">
        ${listSection('Done yesterday', e.timeline.yesterday)}
        ${listSection('To be completed today', e.timeline.today)}
        ${listSection('To be completed this week', e.timeline.week)}
        ${listSection('To be completed next week', e.timeline.nextWeek)}
      </div>
    </div>

    <div class="section">
      <p class="sectionTitle">Blockers &amp; requests</p>
      ${blockersHtml}
      ${changeHtml}
    </div>

    ${e.note ? `<div class="noteFooter">Note: ${e.note}</div>` : ''}
  `;
  document.getElementById('overlay').classList.add('open');
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  const cardEl = document.querySelector(`.card[data-status="${e.status}"][onclick="openTicket('${e.id}')"]`);
}

function closeTicket(){
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('overlay').addEventListener('click', (ev)=>{
  if(ev.target.id==='overlay') closeTicket();
});
document.addEventListener('keydown', (ev)=>{
  if(ev.key==='Escape') closeTicket();
});

/* ---------- module ledger: filter by report category, then by engineer ---------- */

const MODULE_CATEGORIES = [
  {key:'all',        label:'All modules',              get:e=>e.modules.map(m=>({label:m.name, done:m.done}))},
  {key:'completed',  label:'Completed so far',         get:e=>e.modules.filter(m=>m.done).map(m=>({label:m.name, done:true}))},
  {key:'prevDay',    label:'Completed previous day',   get:e=>e.timeline.yesterday.map(t=>({label:t}))},
  {key:'today',      label:'To be completed today',                get:e=>e.timeline.today.map(t=>({label:t}))},
  {key:'week',       label:'To be completed this week',            get:e=>e.timeline.week.map(t=>({label:t}))},
  {key:'nextWeek',   label:'To be completed next week',            get:e=>e.timeline.nextWeek.map(t=>({label:t}))},
  {key:'blockers',   label:'Blockers',                 get:e=>e.blockers.map(t=>({label:t}))},
  {key:'changeReq',  label:'Change requests',          get:e=>e.changeRequests.map(t=>({label:t}))}
];

let moduleFilter = 'all';
let engineerFilter = 'all';

function categoryCount(key){
  const cat = MODULE_CATEGORIES.find(c=>c.key===key);
  return ENGINEERS.reduce((sum,e)=>sum + cat.get(e).length, 0);
}

function renderModuleTabs(){
  document.getElementById('moduleTabs').innerHTML = MODULE_CATEGORIES.map(c=>
    `<button class="tab ${c.key===moduleFilter?'active':''}" onclick="setModuleFilter('${c.key}')">
      ${c.label} <span class="count">${categoryCount(c.key)}</span>
    </button>`
  ).join('');
}

function renderEngineerChips(){
  const chips = [{id:'all', name:'All engineers'}].concat(ENGINEERS.map(e=>({id:e.id, name:e.name})));
  document.getElementById('engineerChips').innerHTML = chips.map(c=>
    `<button class="tab chip ${c.id===engineerFilter?'active':''}" onclick="setEngineerFilter('${c.id}')">${c.name}</button>`
  ).join('');
}

function setModuleFilter(key){ moduleFilter = key; renderModuleTabs(); renderLedgerList(); }
function setEngineerFilter(id){ engineerFilter = id; renderEngineerChips(); renderLedgerList(); }

function renderLedgerList(){
  const cat = MODULE_CATEGORIES.find(c=>c.key===moduleFilter);
  const engineers = engineerFilter==='all' ? ENGINEERS : ENGINEERS.filter(e=>e.id===engineerFilter);

  document.getElementById('ledgerList').innerHTML = engineers.map(e=>{
    const items = cat.get(e);
    const meta = STATUS_META[e.status];
    const itemsHtml = items.length
      ? `<ul class="modList">${items.map(it=>{
          const tick = it.done===undefined ? '' : `<span class="tick ${it.done?'done':'pending'}">${it.done?'\u2611':'\u2610'}</span>`;
          return `<li class="${it.done?'done':'pending'}">${tick}<span class="label">${it.label}</span></li>`;
        }).join('')}</ul>`
      : `<p class="emptyNote">Nothing listed for this category.</p>`;
    return `<div class="ledgerGroup">
      <div class="ledgerGroupHead" onclick="openTicket('${e.id}')">
        <span class="ledgerDot" style="background:${meta.color}"></span>
        <span class="ledgerName">${e.name}</span>
        <span class="ledgerTeam">${e.team}</span>
        <span class="ledgerCount">${items.length} item${items.length===1?'':'s'}</span>
      </div>
      ${itemsHtml}
    </div>`;
  }).join('');
}

document.getElementById('overallNum').textContent = overallPct() + '%';
renderTabs();
renderBarChart();
renderGrid();
renderModuleTabs();
renderEngineerChips();
renderLedgerList();
</script>
